<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- PLAYER -->
  <a-entity position="0 1.6 5"
            camera
            wasd-controls="acceleration: 20"
            look-controls="pointerLockEnabled: true">
  </a-entity>

  <!-- CHÃO -->
  <a-plane color="#2e8b57"
           rotation="-90 0 0"
           width="50"
           height="50">
  </a-plane>

  <!-- LAGO -->
  <a-circle color="#1e90ff"
            radius="5"
            rotation="-90 0 0"
            position="0 0.01 0"
            opacity="0.8">
  </a-circle>

  <!-- ÁRVORES ORIGINAIS -->
  <a-cylinder position="-6 1 -4" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-6 2.5 -4" radius="1" color="green"></a-sphere>

  <a-cylinder position="5 1 -6" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="5 2.5 -6" radius="1" color="green"></a-sphere>

  <a-cylinder position="-3 1 -10" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-3 2.5 -10" radius="1" color="green"></a-sphere>

  <a-cylinder position="7 1 -2" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="7 2.5 -2" radius="1" color="green"></a-sphere>

  <a-cylinder position="-8 1 -8" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-8 2.5 -8" radius="1" color="green"></a-sphere>

  <!-- NOVAS ÁRVORES -->
  
  <a-cylinder position="2 1 -12" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="2 2.5 -12" radius="1" color="green"></a-sphere>

  <a-cylinder position="-10 1 -3" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-10 2.5 -3" radius="1" color="green"></a-sphere>

  <a-cylinder position="9 1 -9" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="9 2.5 -9" radius="1" color="green"></a-sphere>

  <a-cylinder position="-4 1 -14" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-4 2.5 -14" radius="1" color="green"></a-sphere>

  <a-cylinder position="6 1 -13" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="6 2.5 -13" radius="1" color="green"></a-sphere>

  <a-cylinder position="-12 1 -6" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="-12 2.5 -6" radius="1" color="green"></a-sphere>

  <a-cylinder position="11 1 -4" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="11 2.5 -4" radius="1" color="green"></a-sphere>

  <a-cylinder position="0 1 -15" radius="0.2" height="2" color="#8B4513"></a-cylinder>
  <a-sphere position="0 2.5 -15" radius="1" color="green"></a-sphere>

  <!-- CÉU -->
  <a-sky color="#87CEEB"></a-sky>

  <!-- LUZ -->
  <a-light type="ambient" intensity="0.7"></a-light>
  <a-light type="directional" position="5 10 5" intensity="0.6"></a-light>

</a-scene>
</body>
</html>
